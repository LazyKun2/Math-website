<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Casket</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: url("Anime.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* DARK OVERLAY */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    top: 0;
    left: 0;
    z-index: -1;
}

/* CONTENT */
.container {
    padding-top: 40px;
}

h1 { font-size: 2.8em; }
h2 { font-size: 2em; }

/* LOGO */
.logo {
    width: 200px;
    max-width: 60%;
    margin-bottom: 20px;
    animation: zoomIn 1.5s ease;
}

@keyframes zoomIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* MENU */
.menu button {
    padding: 18px;
    margin: 10px;
    font-size: 1.3em;
    border: none;
    background: rgba(255,255,255,0.8);
    color: black;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

.menu button:hover {
    transform: scale(1.1);
    background: #ffd369;
}

/* PAGES */
.page { display: none; }

/* GLASS CARD */
.card {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 25px;
    margin: 30px auto;
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* INPUT */
input {
    padding: 14px;
    margin: 10px;
    width: 85%;
    font-size: 1.2em;
    background: rgba(255,255,255,0.2);
    border: none;
    border-radius: 8px;
    color: white;
}

/* BUTTONS */
button.action {
    padding: 14px;
    margin: 5px;
    font-size: 1.2em;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    border-radius: 8px;
    transition: 0.3s;
}

button.action:hover {
    transform: scale(1.1);
}

/* BACK BUTTON */
.back {
    margin-top: 15px;
    display: block;
    cursor: pointer;
    color: lightblue;
    font-size: 1.2em;
}

/* 📱 MOBILE FIX */
@media (max-width: 600px) {

    h1 { font-size: 2em; }
    h2 { font-size: 1.5em; }

    .menu button {
        width: 90%;
        font-size: 1.1em;
        padding: 15px;
    }

    .card {
        width: 95%;
        padding: 15px;
    }

    input {
        width: 95%;
        font-size: 1em;
    }

    button.action {
        width: 90%;
        font-size: 1em;
    }

    .logo {
        width: 150px;
    }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<!-- HOME -->
<div id="home">
<img src="Inazuma.jpg" class="logo">
<h1>The Casket</h1>
<p style="font-size:1.3em;">Select a Function</p>

<div class="menu">
<button onclick="show('calc')">Calculator</button>
<button onclick="show('fib')">Fibonacci</button>
<button onclick="show('fact')">Factorial</button>
<button onclick="show('prime')">Prime</button>
<button onclick="show('quad')">Quadratic</button>
</div>
</div>

<!-- CALCULATOR -->
<div id="calc" class="page">
<div class="card">
<h2>Calculator</h2>

<input id="a" placeholder="Number 1">
<input id="b" placeholder="Number 2"><br>

<button class="action" onclick="calc('+')">+</button>
<button class="action" onclick="calc('-')">−</button>
<button class="action" onclick="calc('*')">×</button>
<button class="action" onclick="calc('/')">÷</button>

<p id="calcRes"></p>
<span class="back" onclick="back()">⬅ Back</span>
</div>
</div>

<!-- FIBONACCI -->
<div id="fib" class="page">
<div class="card">
<h2>Fibonacci</h2>
<input id="fibN">
<button class="action" onclick="fib()">Generate</button>
<p id="fibRes"></p>
<span class="back" onclick="back()">⬅ Back</span>
</div>
</div>

<!-- FACTORIAL -->
<div id="fact" class="page">
<div class="card">
<h2>Factorial</h2>
<input id="factN">
<button class="action" onclick="fact()">Calculate</button>
<p id="factRes"></p>
<span class="back" onclick="back()">⬅ Back</span>
</div>
</div>

<!-- PRIME -->
<div id="prime" class="page">
<div class="card">
<h2>Prime Check</h2>
<input id="primeN">
<button class="action" onclick="prime()">Check</button>
<p id="primeRes"></p>
<span class="back" onclick="back()">⬅ Back</span>
</div>
</div>

<!-- QUADRATIC -->
<div id="quad" class="page">
<div class="card">
<h2>Quadratic</h2>
<input id="qa" placeholder="a">
<input id="qb" placeholder="b">
<input id="qc" placeholder="c">
<button class="action" onclick="quad()">Solve</button>
<p id="quadRes"></p>
<span class="back" onclick="back()">⬅ Back</span>
</div>
</div>

</div>

<script>

/* Navigation */
function show(page){
document.getElementById("home").style.display="none";
let pages=document.getElementsByClassName("page");
for(let i=0;i<pages.length;i++) pages[i].style.display="none";
document.getElementById(page).style.display="block";
}

function back(){
let pages=document.getElementsByClassName("page");
for(let i=0;i<pages.length;i++) pages[i].style.display="none";
document.getElementById("home").style.display="block";
}

/* Calculator */
function calc(op){
let a=parseFloat(document.getElementById("a").value);
let b=parseFloat(document.getElementById("b").value);

if(isNaN(a) || isNaN(b)){
document.getElementById("calcRes").innerText="Enter valid numbers";
return;
}

let r;

if(op==='+') r=a+b;
if(op==='-') r=a-b;
if(op==='*') r=a*b;
if(op==='/') r=b!==0 ? a/b : "Cannot divide by 0";

document.getElementById("calcRes").innerText="Result: "+r;
}

/* Fibonacci */
function fib(){
let n=parseInt(document.getElementById("fibN").value);

if(isNaN(n) || n<=0){
document.getElementById("fibRes").innerText="Enter valid number";
return;
}

let f=[0,1];
for(let i=2;i<n;i++) f[i]=f[i-1]+f[i-2];

document.getElementById("fibRes").innerText=f.slice(0,n);
}

/* Factorial */
function fact(){
let n=parseInt(document.getElementById("factN").value);

if(isNaN(n) || n<0){
document.getElementById("factRes").innerText="Enter valid number";
return;
}

let r=1;
for(let i=1;i<=n;i++) r*=i;

document.getElementById("factRes").innerText=r;
}

/* Prime */
function prime(){
let n=parseInt(document.getElementById("primeN").value);

if(isNaN(n)){
document.getElementById("primeRes").innerText="Enter valid number";
return;
}

let p=true;
if(n<2) p=false;

for(let i=2;i<=Math.sqrt(n);i++){
if(n%i==0){ p=false; break; }
}

document.getElementById("primeRes").innerText=p?"Prime":"Not Prime";
}

/* Quadratic */
function quad(){
let a=parseFloat(document.getElementById("qa").value);
let b=parseFloat(document.getElementById("qb").value);
let c=parseFloat(document.getElementById("qc").value);

if(isNaN(a)||isNaN(b)||isNaN(c)){
document.getElementById("quadRes").innerText="Enter valid numbers";
return;
}

let d=b*b-4*a*c;

if(d<0){
document.getElementById("quadRes").innerText="No real roots";
}else{
let x1=(-b+Math.sqrt(d))/(2*a);
let x2=(-b-Math.sqrt(d))/(2*a);
document.getElementById("quadRes").innerText="Roots: "+x1+", "+x2;
}
}

</script>

</body>
</html>
